<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community News — VaishyaVaniParivar.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--maroon:#6d1a26;--maroon-deep:#3d0d14;--gold:#c9922a;--gold-light:#e8c46a;--gold-pale:#f5e6b8;--cream:#faf5eb;--ink:#1a0e09;--ink-soft:#5c4033;--line:rgba(201,146,42,0.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);}
nav{position:sticky;top:0;z-index:50;background:rgba(250,245,235,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:'Playfair Display',serif;font-size:1rem;color:var(--maroon-deep);text-decoration:none;}
.nav-right a{font-size:0.82rem;font-weight:500;color:var(--ink-soft);text-decoration:none;margin-left:20px;}
.nav-right a:hover{color:var(--maroon);}
.nav-cta{background:var(--maroon);color:#fff !important;padding:8px 18px;border-radius:999px;}

.page-hero{background:linear-gradient(135deg,var(--maroon-deep) 0%,var(--maroon) 100%);padding:44px 32px;text-align:center;color:#fff;}
.page-hero .eyebrow{font-size:0.7rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-light);margin-bottom:10px;}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);font-weight:700;}

.main{max-width:1000px;margin:0 auto;padding:36px 20px 64px;}

.featured-article{background:#fff;border-radius:20px;border:1px solid var(--line);overflow:hidden;margin-bottom:32px;display:grid;grid-template-columns:1fr 1.2fr;text-decoration:none;color:inherit;transition:all 0.2s;}
.featured-article:hover{transform:translateY(-3px);box-shadow:0 16px 32px -14px rgba(109,26,38,0.2);}
@media(max-width:680px){.featured-article{grid-template-columns:1fr;}}
.fa-img{width:100%;height:100%;min-height:240px;object-fit:cover;display:block;background:var(--cream);}
.fa-body{padding:30px 28px;display:flex;flex-direction:column;justify-content:center;}
.fa-badge{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:12px;}
.fa-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--maroon-deep);line-height:1.25;margin-bottom:12px;}
.fa-desc{font-size:0.88rem;color:var(--ink-soft);line-height:1.7;margin-bottom:16px;}
.fa-meta{font-size:0.74rem;color:var(--ink-soft);}
.read-more{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:0.82rem;font-weight:600;color:var(--maroon);}

.section-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--maroon-deep);margin-bottom:18px;}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:760px){.news-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.news-grid{grid-template-columns:1fr;}}

.news-card{background:#fff;border-radius:14px;border:1px solid var(--line);overflow:hidden;transition:all 0.2s;text-decoration:none;color:inherit;display:block;}
.news-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px -12px rgba(109,26,38,0.18);border-color:rgba(201,146,42,0.5);}
.news-card img{width:100%;height:140px;object-fit:cover;display:block;background:var(--cream);}
.news-card-body{padding:14px;}
.news-card-title{font-size:0.92rem;font-weight:700;color:var(--maroon-deep);margin-bottom:6px;line-height:1.35;}
.news-card-desc{font-size:0.78rem;color:var(--ink-soft);line-height:1.5;}
.news-card-date{font-size:0.68rem;color:var(--gold);font-weight:600;margin-top:8px;}

.empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}
.loading{text-align:center;padding:60px 20px;color:var(--ink-soft);}
footer{background:var(--maroon-deep);color:rgba(250,245,235,0.65);text-align:center;padding:28px;font-size:0.78rem;}
footer a{color:var(--gold-light);text-decoration:none;}

  /* ── PHASE 8 MOBILE FIXES ── */
  @media (max-width: 480px) {
    body { font-size: 15px; }
    nav { padding: 0 14px !important; }
    .nav-right a:not(.nav-cta) { display: none; }
    .page-hero { padding: 36px 16px !important; }
    .page-hero h1 { font-size: 1.6rem !important; }
    .main-layout, .main { padding-left: 14px !important; padding-right: 14px !important; }
    .stat-row { grid-template-columns: 1fr 1fr !important; }
  }
</style>

  <!-- SEO Meta Tags -->
  <meta name="description" content="Latest news, announcements and success stories from the Vaishya Vani Samaj community.">
  <meta name="keywords" content="Vaishya Vani, Vaishya Vani Samaj, Vaishya Vani Parivar, community, matrimony, business, Goa, Maharashtra, Karnataka, Kerala">
  <meta name="author" content="VaishyaVaniParivar.com">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://vaishyavaniparivar.com/news.html">

  <!-- Open Graph (Facebook, WhatsApp) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Community News — VaishyaVaniParivar.com">
  <meta property="og:description" content="Latest news, announcements and success stories from the Vaishya Vani Samaj community.">
  <meta property="og:url" content="https://vaishyavaniparivar.com/news.html">
  <meta property="og:image" content="https://vaishyavaniparivar.com/logo.jpeg">
  <meta property="og:site_name" content="VaishyaVaniParivar.com">
  <meta property="og:locale" content="en_IN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Community News — VaishyaVaniParivar.com">
  <meta name="twitter:description" content="Latest news, announcements and success stories from the Vaishya Vani Samaj community.">
  <meta name="twitter:image" content="https://vaishyavaniparivar.com/logo.jpeg">
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">VaishyaVaniParivar.com</a>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="business-hub.html">Businesses</a>
    <a href="register.html" class="nav-cta">Join Free</a>
  </div>
</nav>

<div class="page-hero">
  <div class="eyebrow">Community News</div>
  <h1>News & Announcements</h1>
</div>

<div class="main">
  <div id="featuredWrap"></div>
  <div id="newsGrid" class="news-grid"><div class="loading" style="grid-column:1/-1">Loading news...</div></div>
</div>

<footer>
  <a href="index.html">VaishyaVaniParivar.com</a>
 · <a href="privacy.html" style="color:inherit;">Privacy</a> · <a href="terms.html" style="color:inherit;">Terms</a>
</footer>

<script>
const API = 'https://vaishya-vani-backend.onrender.com';

async function loadNews() {
  try {
    const data = await fetch(API + '/api/listings/news').then(r => r.json());
    if (!data.length) {
      document.getElementById('newsGrid').innerHTML = '<div class="empty" style="grid-column:1/-1">No news articles yet. Check back soon!</div>';
      return;
    }
    const [featured, ...rest] = data;
    // Featured article
    document.getElementById('featuredWrap').innerHTML = `
      <a class="featured-article" href="listing-detail.html?id=${featured.id}">
        <img class="fa-img" src="${featured.image_url || 'https://placehold.co/600x400/faf5eb/c9922a?text=News'}"
             alt="${featured.title}" onerror="this.src='https://placehold.co/600x400/faf5eb/c9922a?text=News'">
        <div class="fa-body">
          <div class="fa-badge">📰 Featured</div>
          <div class="fa-title">${featured.title}</div>
          <div class="fa-desc">${featured.description || ''}</div>
          <div class="fa-meta">${featured.meta_line || new Date(featured.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'})}</div>
          <span class="read-more">Read more →</span>
        </div>
      </a>`;

    if (!rest.length) { document.getElementById('newsGrid').innerHTML = ''; return; }
    document.getElementById('newsGrid').innerHTML = rest.map(n => `
      <a class="news-card" href="listing-detail.html?id=${n.id}">
        <img src="${n.image_url || 'https://placehold.co/400x200/faf5eb/c9922a?text=News'}"
             alt="${n.title}" onerror="this.src='https://placehold.co/400x200/faf5eb/c9922a?text=News'">
        <div class="news-card-body">
          <div class="news-card-title">${n.title}</div>
          <div class="news-card-desc">${n.description ? n.description.substring(0,80)+'…' : ''}</div>
          <div class="news-card-date">${n.meta_line || new Date(n.created_at).toLocaleDateString('en-IN')}</div>
        </div>
      </a>`).join('');
  } catch(e) {
    document.getElementById('newsGrid').innerHTML = '<div class="empty" style="grid-column:1/-1">Could not load news. Please try again shortly.</div>';
  }
}

loadNews();
</script>
</body>
</html>
