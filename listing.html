<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Listings — VaishyaVaniParivar.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#7a1f2b; --maroon-deep:#4a1118;
    --gold:#c9952f; --gold-soft:#f1d99b;
    --cream:#fbf6ec; --ink:#241712; --ink-soft:#5b4a3f; --line:#e8dcc4;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:'Inter', sans-serif; background:var(--cream); color:var(--ink); }

  .topbar{
    background:var(--maroon-deep);
    color:#fff;
    padding:14px 20px;
    text-align:center;
    font-size:0.85rem;
  }
  .topbar a{ color:var(--gold-soft); text-decoration:none; font-weight:600; }

  header.page-head{
    max-width:900px;
    margin:0 auto;
    padding:36px 20px 10px;
    text-align:center;
  }
  header.page-head h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:700;
    font-size:2.1rem;
    color:var(--maroon-deep);
  }
  header.page-head p{ color:var(--ink-soft); font-size:0.9rem; margin-top:6px; }

  main{ max-width:900px; margin:0 auto; padding:20px 20px 70px; }

  .card-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; }
  @media (max-width:640px){ .card-grid{ grid-template-columns:1fr; } }

  .item-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
  }
  .item-card img{ width:100%; height:170px; object-fit:cover; display:block; }
  .item-card .body{ padding:16px; }
  .item-card h3{ font-size:1rem; color:var(--ink); margin-bottom:4px; }
  .item-card p{ font-size:0.82rem; color:var(--ink-soft); line-height:1.5; }
  .item-card .meta{ font-size:0.74rem; color:var(--maroon); margin-top:8px; font-weight:600; }

  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:0.92rem;
  }
  .loading{ text-align:center; color:var(--ink-soft); padding:60px 20px; }

  footer{ text-align:center; padding:30px 20px; font-size:0.78rem; color:var(--ink-soft); }
  footer a{ color:var(--maroon); text-decoration:none; font-weight:600; }

  /* ── PHASE 8 MOBILE FIXES ── */
  @media (max-width: 480px) {
    body { font-size: 15px; }
    nav { padding: 0 14px !important; }
    .nav-right a:not(.nav-cta) { display: none; }
    .page-hero { padding: 36px 16px !important; }
    .page-hero h1 { font-size: 1.6rem !important; }
    .main-layout, .main { padding-left: 14px !important; padding-right: 14px !important; }
    .stat-row { grid-template-columns: 1fr 1fr !important; }
  }
</style>

  <!-- SEO Meta Tags -->
  <meta name="description" content="Browse community listings — education, jobs, temples, directory and more from the Vaishya Vani Parivar.">
  <meta name="keywords" content="Vaishya Vani, Vaishya Vani Samaj, Vaishya Vani Parivar, community, matrimony, business, Goa, Maharashtra, Karnataka, Kerala">
  <meta name="author" content="VaishyaVaniParivar.com">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://vaishyavaniparivar.com/listing.html">

  <!-- Open Graph (Facebook, WhatsApp) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Community Listings — VaishyaVaniParivar.com">
  <meta property="og:description" content="Browse community listings — education, jobs, temples, directory and more from the Vaishya Vani Parivar.">
  <meta property="og:url" content="https://vaishyavaniparivar.com/listing.html">
  <meta property="og:image" content="https://vaishyavaniparivar.com/logo.jpeg">
  <meta property="og:site_name" content="VaishyaVaniParivar.com">
  <meta property="og:locale" content="en_IN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Community Listings — VaishyaVaniParivar.com">
  <meta name="twitter:description" content="Browse community listings — education, jobs, temples, directory and more from the Vaishya Vani Parivar.">
  <meta name="twitter:image" content="https://vaishyavaniparivar.com/logo.jpeg">
</head>
<body>

<div class="topbar">
  <a href="index.html">← Back to homepage</a>
</div>

<header class="page-head">
  <h1 id="pageTitle">Loading…</h1>
  <p id="pageSub"></p>
</header>

<main>
  <div class="loading" id="loadingMsg">Loading listings…</div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty" id="emptyMsg" style="display:none;">No listings yet in this section. Check back soon!</div>
</main>

<footer>
  <a href="index.html">Homepage</a> · <a href="register.html">Register now</a>
 · <a href="privacy.html" style="color:inherit;">Privacy</a> · <a href="terms.html" style="color:inherit;">Terms</a>
</footer>

<script>
  const API_BASE = 'https://vaishya-vani-backend.onrender.com';

  const TYPE_CONFIG = {
    events:    { title: 'Recent Events', sub: 'Community meets, gatherings, and cultural events', endpoint: '/api/listings/event' },
    news:      { title: 'News', sub: 'Community announcements and stories', endpoint: '/api/listings/news' },
    jobs:      { title: 'Jobs', sub: 'Postings from community businesses', endpoint: '/api/listings/job' },
    education: { title: 'Education', sub: 'Scholarships, mentorship, and learning resources', endpoint: '/api/listings/education' },
    temples:   { title: 'Temples & Trusts', sub: 'Community temples and charitable trusts', endpoint: '/api/listings/temple' },
    directory: { title: 'Community Directory', sub: 'Registered community families and organizations', endpoint: '/api/listings/directory' },
    business:  { title: 'Business Hub', sub: 'Businesses listed by our community', endpoint: '/api/businesses' },
    matrimony: { title: 'Matrimony Portal', sub: 'Profiles shared by community families', endpoint: '/api/matrimony' },
  };

  const params = new URLSearchParams(window.location.search);
  const type = params.get('type') || 'events';
  const config = TYPE_CONFIG[type] || TYPE_CONFIG.events;

  document.getElementById('pageTitle').textContent = config.title;
  document.getElementById('pageSub').textContent = config.sub;

  function cardHtml(item){
    if (type === 'business') {
      return `<a class="item-card" href="listing-detail.html?id=${item.id}" style="text-decoration:none;color:inherit;display:block;">
        <img src="${item.logo_image_url || 'https://placehold.co/600x400?text=No+Image'}" alt="${item.business_name}">
        <div class="body">
          <h3>${item.business_name}</h3>
          <p>${item.description || ''}</p>
          <div class="meta">🏷️ ${item.category || 'General'} · ${item.city || ''}</div>
        </div>
      </div>`;
    }
    if (type === 'matrimony') {
      return `<a class="item-card" href="listing-detail.html?id=${item.id}" style="text-decoration:none;color:inherit;display:block;">
        <img src="${item.profile_photo_url || 'https://placehold.co/400x500?text=No+Photo'}" alt="Matrimony profile">
        <div class="body">
          <h3>Profile #${item.id}</h3>
          <p>${item.age || '—'} yrs · ${item.education || ''} · ${item.profession || ''}</p>
          <div class="meta">Native: ${item.native_place || '—'} · Based in ${item.current_location || '—'}</div>
        </div>
      </div>`;
    }
    // generic listings (events, news, jobs, education, temples, directory)
    return `<a class="item-card" href="listing-detail.html?id=${item.id}" style="text-decoration:none;color:inherit;display:block;">
      <img src="${item.image_url || 'https://placehold.co/600x400?text=No+Image'}" alt="${item.title}">
      <div class="body">
        <h3>${item.title}</h3>
        <p>${item.description || ''}</p>
        <div class="meta">${item.meta_line || ''}</div>
      </div>
    </div></a>`;
  }

  async function loadListings(){
    const grid = document.getElementById('cardGrid');
    const loading = document.getElementById('loadingMsg');
    const empty = document.getElementById('emptyMsg');
    try {
      const res = await fetch(API_BASE + config.endpoint);
      const data = await res.json();
      loading.style.display = 'none';
      if (!Array.isArray(data) || data.length === 0) {
        empty.style.display = 'block';
        return;
      }
      grid.innerHTML = data.map(cardHtml).join('');
    } catch (err) {
      loading.textContent = 'Could not load listings. Please try again shortly.';
    }
  }
  loadListings();
</script>

</body>
</html>
