<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimony Profile — VaishyaVaniParivar.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--maroon:#6d1a26;--maroon-deep:#3d0d14;--gold:#c9922a;--gold-light:#e8c46a;--gold-pale:#f5e6b8;--cream:#faf5eb;--ink:#1a0e09;--ink-soft:#5c4033;--line:rgba(201,146,42,0.2);--pink:#fdf0f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);}
nav{position:sticky;top:0;z-index:50;background:rgba(250,245,235,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:'Playfair Display',serif;font-size:1rem;color:var(--maroon-deep);text-decoration:none;}
.nav-right a{font-size:0.82rem;font-weight:500;color:var(--ink-soft);text-decoration:none;margin-left:20px;}
.nav-right a:hover{color:var(--maroon);}

.breadcrumb{max-width:980px;margin:18px auto 0;padding:0 20px;font-size:0.78rem;color:var(--ink-soft);}
.breadcrumb a{color:var(--maroon);text-decoration:none;}

.main{max-width:980px;margin:0 auto;padding:18px 20px 64px;display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start;}
@media(max-width:780px){.main{grid-template-columns:1fr;}}

/* LEFT COL */
.photo-col{display:flex;flex-direction:column;gap:16px;}
.photo-wrap{background:#fff;border-radius:18px;border:1px solid var(--line);overflow:hidden;}
.profile-photo{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;display:block;background:var(--pink);}
.photo-placeholder{width:100%;aspect-ratio:3/4;background:linear-gradient(160deg,var(--pink) 0%,#f5d0d0 100%);display:flex;align-items:center;justify-content:center;font-size:6rem;}
.photo-meta{padding:14px 16px;}
.profile-id-big{font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.profile-name-big{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--maroon-deep);font-style:italic;}

.contact-card{background:linear-gradient(135deg,var(--maroon-deep) 0%,var(--maroon) 100%);border-radius:16px;padding:20px;color:#fff;text-align:center;}
.contact-card h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:6px;}
.contact-card p{font-size:0.78rem;opacity:0.75;margin-bottom:14px;line-height:1.5;}
.contact-btn{display:block;background:#fff;color:var(--maroon-deep);font-weight:700;font-size:0.82rem;padding:10px;border-radius:10px;text-decoration:none;margin-bottom:8px;transition:opacity 0.15s;}
.contact-btn:hover{opacity:0.9;}
.contact-btn.wa{background:#25D366;color:#fff;}
.contact-btn.wa:hover{background:#1ebc59;}
.phone-reveal{font-size:0.9rem;font-weight:700;color:var(--gold-light);margin-top:8px;}

.share-card{background:#fff;border-radius:14px;border:1px solid var(--line);padding:16px;text-align:center;}
.share-card p{font-size:0.75rem;color:var(--ink-soft);margin-bottom:10px;}
.share-row{display:flex;gap:8px;justify-content:center;}
.share-btn{font-size:0.74rem;font-weight:600;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;text-decoration:none;color:var(--ink);}
.share-btn:hover{background:var(--cream);}
.share-btn.wa{background:#25D366;color:#fff;border-color:#25D366;}

/* RIGHT COL */
.detail-col{display:flex;flex-direction:column;gap:16px;}
.section-card{background:#fff;border-radius:16px;border:1px solid var(--line);padding:22px 24px;}
.section-card h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--maroon-deep);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--line);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.info-item{background:var(--cream);border-radius:10px;padding:11px 14px;}
.info-item .label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);margin-bottom:3px;}
.info-item .value{font-size:0.88rem;color:var(--ink);font-weight:600;}
.info-item .value.empty{color:var(--ink-soft);font-weight:400;font-style:italic;}
.full-width{grid-column:1/-1;}
.body-text{font-size:0.9rem;line-height:1.75;color:var(--ink-soft);}
.horoscope-link{display:inline-flex;align-items:center;gap:6px;background:var(--gold-pale);color:var(--maroon-deep);font-size:0.8rem;font-weight:600;padding:8px 16px;border-radius:999px;text-decoration:none;margin-top:8px;}
.horoscope-link:hover{background:var(--gold-light);}

.privacy-notice{background:var(--gold-pale);border:1px solid rgba(201,146,42,0.3);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:#6b4e00;margin-top:10px;}

.loading{text-align:center;padding:80px 20px;color:var(--ink-soft);}
footer{background:var(--maroon-deep);color:rgba(250,245,235,0.65);text-align:center;padding:28px;font-size:0.78rem;}
footer a{color:var(--gold-light);text-decoration:none;}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">VaishyaVaniParivar.com</a>
  <div class="nav-right">
    <a href="matrimony.html">← Matrimony Portal</a>
    <a href="register.html">Register Profile</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a> ›
  <a href="matrimony.html">Matrimony</a> ›
  <span id="breadcrumbTitle">Profile</span>
</div>

<div id="mainWrap">
  <div class="loading">Loading profile...</div>
</div>

<footer>
  <a href="index.html">VaishyaVaniParivar.com</a> · <a href="matrimony.html">← Back to Matrimony</a>
</footer>

<script>
const API = 'https://vaishya-vani-backend.onrender.com';
const params = new URLSearchParams(window.location.search);
const id = params.get('id');

function val(v, fallback = '—') { return (v && v.toString().trim()) ? v : fallback; }

async function loadProfile() {
  if (!id) {
    document.getElementById('mainWrap').innerHTML = '<div class="loading">Profile ID missing. <a href="matrimony.html">← Back</a></div>';
    return;
  }
  try {
    const p = await fetch(API + '/api/matrimony/' + id).then(r => r.json());
    if (p.error) {
      document.getElementById('mainWrap').innerHTML = '<div class="loading">Profile not found. <a href="matrimony.html">← Back</a></div>';
      return;
    }

    const profileId = 'VVP-' + String(p.id).padStart(4, '0');
    const genderEmoji = p.gender === 'Female' ? '👰' : p.gender === 'Male' ? '🤵' : '👤';
    const location = [p.taluka_name, p.district_name, p.state_name].filter(Boolean).join(', ') || p.native_place || '—';
    const pageUrl = window.location.href;
    const waShareText = encodeURIComponent(`Matrimony profile ${profileId} on VaishyaVaniParivar.com:\n${pageUrl}`);
    const waContactText = p.family_contact
      ? encodeURIComponent(`Hello, I found your profile (${profileId}) on VaishyaVaniParivar.com and would like to connect.`)
      : '';

    document.title = `${profileId} — VaishyaVaniParivar.com`;
    document.getElementById('breadcrumbTitle').textContent = profileId;

    document.getElementById('mainWrap').innerHTML = `
      <div class="main">
        <!-- LEFT: PHOTO + CONTACT -->
        <div class="photo-col">
          <div class="photo-wrap">
            ${p.profile_photo_url
              ? `<img class="profile-photo" src="${p.profile_photo_url}" alt="${profileId}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
              : ''
            }
            <div class="photo-placeholder" ${p.profile_photo_url ? 'style="display:none;"' : ''}>${genderEmoji}</div>
            <div class="photo-meta">
              <div class="profile-id-big">${profileId}</div>
              <div class="profile-name-big">${genderEmoji} ${p.gender || 'Profile'} · ${val(p.age)} yrs</div>
            </div>
          </div>

          <div class="contact-card">
            <h3>Interested?</h3>
            <p>Contact the family directly to express your interest.</p>
            ${p.family_contact
              ? `<div class="phone-reveal">📞 ${p.family_contact}</div>
                 <a class="contact-btn wa" href="https://wa.me/91${p.family_contact.replace(/\D/g,'')}?text=${waContactText}" target="_blank" style="margin-top:10px;">
                   💬 WhatsApp Family
                 </a>`
              : `<div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:12px;font-size:0.78rem;opacity:0.8;margin-bottom:4px;">
                   🔒 Contact details are available to registered community members.<br><br>
                   <a href="register.html" style="color:var(--gold-light);font-weight:700;">Register / Login to view →</a>
                 </div>`
            }
            <a class="contact-btn" href="mailto:contact@vaishyavaniparivar.com?subject=Interest in Profile ${profileId}"
               style="margin-top:10px;background:rgba(255,255,255,0.15);color:#fff;">
              ✉️ Contact via Platform
            </a>
            <div id="interestSection" style="margin-top:10px;"></div>
          </div>

          <div class="share-card">
            <p>Share this profile with your family</p>
            <div class="share-row">
              <a class="share-btn wa" href="https://wa.me/?text=${waShareText}" target="_blank">💬 Share</a>
              <button class="share-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
          </div>
        </div>

        <!-- RIGHT: DETAILS -->
        <div class="detail-col">
          <div class="section-card">
            <h2>Personal Details</h2>
            <div class="info-grid">
              <div class="info-item"><div class="label">Age</div><div class="value ${!p.age?'empty':''}">${val(p.age) !== '—' ? p.age + ' years' : '—'}</div></div>
              <div class="info-item"><div class="label">Gender</div><div class="value ${!p.gender?'empty':''}">${val(p.gender)}</div></div>
              <div class="info-item"><div class="label">Height</div><div class="value ${!p.height?'empty':''}">${val(p.height)}</div></div>
              <div class="info-item"><div class="label">Gotra</div><div class="value ${!p.gotra?'empty':''}">${val(p.gotra)}</div></div>
              <div class="info-item"><div class="label">Native Place</div><div class="value ${!p.native_place?'empty':''}">${val(p.native_place)}</div></div>
              <div class="info-item"><div class="label">Current Location</div><div class="value ${!p.current_location?'empty':''}">${val(p.current_location)}</div></div>
              <div class="info-item"><div class="label">Language Preference</div><div class="value ${!p.language_preference?'empty':''}">${val(p.language_preference)}</div></div>
              <div class="info-item"><div class="label">Registered Location</div><div class="value">${location}</div></div>
            </div>
          </div>

          <div class="section-card">
            <h2>Education & Career</h2>
            <div class="info-grid">
              <div class="info-item full-width"><div class="label">Education</div><div class="value ${!p.education?'empty':''}">${val(p.education)}</div></div>
              <div class="info-item full-width"><div class="label">Profession</div><div class="value ${!p.profession?'empty':''}">${val(p.profession)}</div></div>
            </div>
          </div>

          ${p.family_background || p.family_introduction ? `
          <div class="section-card">
            <h2>Family Background</h2>
            ${p.family_background ? `
              <div class="body-text" style="margin-bottom:${p.family_introduction ? '16px' : '0'};">
                ${p.family_background}
              </div>` : ''}
            ${p.family_introduction ? `
              <div style="background:var(--cream);border-radius:10px;padding:14px;margin-top:8px;">
                <div style="font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-soft);margin-bottom:6px;">Family Introduction</div>
                <div class="body-text">${p.family_introduction}</div>
              </div>` : ''}
          </div>` : ''}

          ${p.horoscope_url ? `
          <div class="section-card">
            <h2>Horoscope</h2>
            <p class="body-text">Horoscope document is available upon mutual interest.</p>
            <a class="horoscope-link" href="${p.horoscope_url}" target="_blank" rel="noopener">🔮 View Horoscope Document</a>
          </div>` : ''}

          <div class="section-card" style="background:var(--pink);">
            <div class="privacy-notice">
              🔒 This is profile <strong>${profileId}</strong> on VaishyaVaniParivar.com — a verified platform for the Vaishya Vani community. All profiles are approved by our community admin before being listed. Contact details are shared in good faith for matrimonial purposes only.
            </div>
          </div>
        </div>
      </div>`;
    // Check interest status after DOM renders
    setTimeout(() => checkInterestStatus(p.id), 150);
  } catch(e) {
    document.getElementById('mainWrap').innerHTML = '<div class="loading">Could not load profile. <a href="matrimony.html">← Back</a></div>';
  }
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Link', 2000);
  });
}

// Check if logged-in member has already sent/received interest for this profile
async function checkInterestStatus(profileId) {
  const token = localStorage.getItem('vvp_member_token');
  const section = document.getElementById('interestSection');
  if (!section) return;

  if (!token) {
    section.innerHTML = `<a href="member-login.html?redirect=matrimony-detail.html?id=${profileId}" 
      style="display:block;background:rgba(255,255,255,0.15);color:#fff;text-align:center;padding:10px;border-radius:10px;text-decoration:none;font-size:0.82rem;font-weight:600;margin-top:0;">
      🔑 Login to Send Interest
    </a>`;
    return;
  }

  try {
    const res = await fetch(API + '/api/interests/status/' + profileId, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const status = await res.json();

    if (status.is_match) {
      section.innerHTML = `<div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:10px;text-align:center;font-size:0.82rem;color:var(--gold-light);font-weight:700;">💞 It's a Match! <a href="my-interests.html" style="color:#fff;text-decoration:underline;">View in My Interests</a></div>`;
    } else if (status.sent) {
      const label = status.sent.status === 'accepted' ? '✓ Interest Accepted' : status.sent.status === 'declined' ? '✗ Interest Declined' : '⏳ Interest Sent';
      section.innerHTML = `<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.85);">${label}</div>`;
    } else {
      section.innerHTML = `
        <button onclick="sendInterest(${profileId})" 
          style="width:100%;background:var(--gold-light);color:var(--maroon-deep);border:none;border-radius:10px;padding:11px;font-weight:700;font-size:0.88rem;cursor:pointer;margin-top:0;">
          💌 Send Interest
        </button>`;
    }
  } catch(e) {}
}

async function sendInterest(profileId) {
  const token = localStorage.getItem('vvp_member_token');
  if (!token) { window.location.href = 'member-login.html?redirect=' + encodeURIComponent(window.location.href); return; }

  const section = document.getElementById('interestSection');
  section.innerHTML = '<div style="text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.7);padding:8px;">Sending...</div>';

  try {
    const res = await fetch(API + '/api/interests/send', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ receiver_profile_id: profileId })
    });
    const data = await res.json();
    if (res.ok) {
      if (data.is_match) {
        section.innerHTML = `<div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:10px;text-align:center;font-size:0.82rem;color:var(--gold-light);font-weight:700;">💞 It's a Match! <a href="my-interests.html" style="color:#fff;text-decoration:underline;">View Now</a></div>`;
      } else {
        section.innerHTML = `<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:10px;text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.85);">⏳ Interest Sent! <a href="my-interests.html" style="color:var(--gold-light);">View in My Interests</a></div>`;
      }
    } else {
      section.innerHTML = `<div style="background:rgba(255,0,0,0.2);border-radius:10px;padding:10px;text-align:center;font-size:0.78rem;color:#ffb3b3;">${data.error || 'Could not send. Please try again.'}</div>`;
    }
  } catch(e) {
    section.innerHTML = '<div style="color:rgba(255,255,255,0.5);font-size:0.78rem;text-align:center;padding:8px;">Connection error. Please try again.</div>';
  }
}

loadProfile();
</script>
</body>
</html>
